<main>
  <div class="container mt-4">
    <div class="row g-4">

      <!-- 左：Films 列表 -->
      <div class="col-lg-8">
        <div class="changertxt">
        <h2 class="mb-3">🎬 Films</h2>
        </div>

        @let movies = filteredMovies();
        @if (movies.length === 0) {
          <div class="alert alert-warning mt-3">Aucun résultat</div>
        } @else {
          <div class="d-flex flex-column gap-3">
            @for (movie of movies; track movie.id) {
              <app-movie-card [movie]="movie"></app-movie-card>
            }
          </div>
        }

      </div>
      
      <!-- 右：今日热门搜索 -->
      <div class="col-lg-4">
        <div class="card shadow-sm p-4 position-sticky sidebar-card" style="top: 100px;">
          <h5 class="mb-3">🎥 Le saviez-vous ?</h5>
          <ul class="list-group list-group-flush">
            <li class="list-group-item">Titanic était le film le plus cherde l'histoire en 1997.</li>
            
          </ul>
        </div>
      </div>

    </div>
  </div>
</main>
