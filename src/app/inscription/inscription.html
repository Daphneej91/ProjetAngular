<!-- inscription.html -->
<div class="container mt-5">
    <h2 class="text-center">Inscription</h2>

    <div class="mb-3">
        <label>Prénom :</label>
        <input type="text" class="form-control" [(ngModel)]="firstName" />
    </div>

    <div class="mb-3">
        <label>Nom :</label>
        <input type="text" class="form-control" [(ngModel)]="lastName" />
    </div>

    <div class="mb-3">
        <label>Âge :</label>
        <input type="number" class="form-control" [(ngModel)]="age" />
    </div>

    <div class="mb-3">
        <label>Email :</label>
        <input type="email" class="form-control" [(ngModel)]="email" />
    </div>

    <button class="btn btn-warning mt-3" (click)="inscrire()">S'inscrire</button>

    <p class="text-danger mt-2">{{ errorMessage }}</p>
</div>
